<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almas - Pendaftaran</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #e3f2fd; padding-top: 50px; }
        .card { background: white; padding: 30px; display: inline-block; border-radius: 15px; }
        input { padding: 10px; width: 250px; margin: 5px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; background: #2196f3; color: white; border: none; border-radius: 5px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
</head>
<body>
    <div class="card">
        <h2>📝 Daftarkan Anak</h2>
        <input type="text" id="namaAnak" placeholder="Nama Lengkap Anak"><br>
        <input type="text" id="namaOrtu" placeholder="Nama Orang Tua"><br>
        <button onclick="simpanData()">Simpan Data 💾</button>
        <p><a href="ortu.html">Kembali ke Penjemputan</a></p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQB33Au3Oq5-81MMJnCZ5NZXzLrySeyOg",
            authDomain: "almas-75e72.firebaseapp.com",
            databaseURL: "https://almas-75e72-default-rtdb.firebaseio.com",
            projectId: "almas-75e72",
            storageBucket: "almas-75e72.firebasestorage.app",
            messagingSenderId: "726212467820",
            appId: "1:726212467820:web:fd4354f8595bf587eb0c49"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function simpanData() {
            const namaA = document.getElementById('namaAnak').value;
            const namaO = document.getElementById('namaOrtu').value;
            if(namaA && namaO) {
                db.ref('siswa').push({
                    namaAnak: namaA,
                    namaOrtu: namaO,
                    status: "Belum dijemput"
                });
                alert("Berhasil mendaftar! 🎉");
                document.getElementById('namaAnak').value = "";
                document.getElementById('namaOrtu').value = "";
            } else {
                alert("Isi semua data ya! ⚠️");
            }
        }
    </script>
</body>
</html>
