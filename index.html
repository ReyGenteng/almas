<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almas - Monitor Penjemputan</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #e8f5e9; }
        .box { max-width: 500px; margin: 50px auto; background: white; padding: 20px; border-radius: 15px; shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .anak { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; font-size: 1.2em; }
        .belum { color: #d32f2f; font-weight: bold; }
        .sudah { color: #388e3c; font-weight: bold; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
</head>
<body>
    <div class="box">
        <h1>🏫 Daftar Penjemputan Almas</h1>
        <div id="daftarAnak">Memuat data... ⏳</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQB33Au3Oq5-81MMJnCZ5NZXzLrySeyOg",
            authDomain: "almas-75e72.firebaseapp.com",
            databaseURL: "https://almas-75e72-default-rtdb.firebaseio.com",
            projectId: "almas-75e72",
            storageBucket: "almas-75e72.firebasestorage.app",
            messagingSenderId: "726212467820",
            appId: "1:726212467820:web:fd4354f8595bf587eb0c49"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('siswa').on('value', (snapshot) => {
            const list = document.getElementById('daftarAnak');
            list.innerHTML = "";
            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                const statusKls = data.status === "Dijemput" ? "sudah" : "belum";
                list.innerHTML += `
                    <div class="anak">
                        <span>👦 ${data.namaAnak}</span>
                        <span class="${statusKls}">${data.status}</span>
                    </div>`;
            });
        });
    </script>
</body>
</html>
