<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almas - Monitor Penjemputan</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #e8f5e9; padding: 20px; text-align: center; }
        h1 { color: #2e7d32; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .list-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #ddd; font-size: 18px; font-weight: bold; }
        .status-belum { color: red; }
        .status-dijemput { color: green; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Monitor Penjemputan Almas 🏫</h1>
        <div id="listAnak">
            <p>Memuat data... ⏳</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQB33Au3Oq5-81MMJnCZ5NZXzLrySeyOg",
            authDomain: "almas-75e72.firebaseapp.com",
            projectId: "almas-75e72",
            storageBucket: "almas-75e72.firebasestorage.app",
            messagingSenderId: "726212467820",
            appId: "1:726212467820:web:fd4354f8595bf587eb0c49"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // onSnapshot membuat data terupdate otomatis (real-time)
        onSnapshot(collection(db, "siswa"), (snapshot) => {
            const listContainer = document.getElementById('listAnak');
            listContainer.innerHTML = ""; // Bersihkan list sebelum diisi ulang

            if(snapshot.empty) {
                listContainer.innerHTML = "<p>Belum ada data anak 🚸</p>";
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'list-item';
                
                const statusClass = data.status === "Dijemput" ? "status-dijemput" : "status-belum";
                
                div.innerHTML = `
                    <span>👦👧 ${data.nama_anak} (Ortu: ${data.nama_ortu})</span>
                    <span class="${statusClass}">${data.status}</span>
                `;
                listContainer.appendChild(div);
            });
        });
    </script>
</body>
</html>
