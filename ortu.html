<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almas - Jemput Anak</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #fff3e0; padding: 50px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input, button { padding: 10px; margin: 10px 0; width: 90%; border-radius: 5px; border: 1px solid #ccc; }
        button { background-color: #ff9800; color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background-color: #e68a00; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Aplikasi Jemput Anak 🚕</h2>
        <input type="text" id="namaAnak" placeholder="Masukkan Nama Anak Kamu" required>
        <button id="btnJemput">Jemput Anak Sekarang</button>
        <p>Belum terdaftar? <a href="daftar.html">Daftar di sini</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQB33Au3Oq5-81MMJnCZ5NZXzLrySeyOg",
            authDomain: "almas-75e72.firebaseapp.com",
            projectId: "almas-75e72",
            storageBucket: "almas-75e72.firebasestorage.app",
            messagingSenderId: "726212467820",
            appId: "1:726212467820:web:fd4354f8595bf587eb0c49"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('btnJemput').addEventListener('click', async () => {
            const anak = document.getElementById('namaAnak').value;

            if(anak === "") {
                alert("Masukkan nama anak dulu ya! 🛑");
                return;
            }

            const q = query(collection(db, "siswa"), where("nama_anak", "==", anak));
            const querySnapshot = await getDocs(q);

            if (querySnapshot.empty) {
                alert("Nama anak tidak ditemukan. Silakan daftar dulu! 🔍");
            } else {
                querySnapshot.forEach(async (document) => {
                    const docRef = doc(db, "siswa", document.id);
                    await updateDoc(docRef, {
                        status: "Dijemput"
                    });
                    alert(`Status ${anak} berhasil diubah menjadi Dijemput! ✅`);
                });
            }
        });
    </script>
</body>
</html>
